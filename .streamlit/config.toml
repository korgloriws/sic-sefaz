[server]
enableCORS = true
enableXsrfProtection = false

# Tema padrão (light). Use [theme.dark] para modo escuro no menu do Streamlit.
[theme]
base = "light"
primaryColor = "#FF4B4B"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"
baseRadius = "0.5rem"
buttonRadius = "0.5rem"
showWidgetBorder = true

[theme.sidebar]
backgroundColor = "#F0F2F6"
secondaryBackgroundColor = "#FFFFFF"

# Tema escuro (usuário pode alternar no menu ⋮ > Settings > Theme)
[theme.dark]
primaryColor = "#FF6B6B"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
baseRadius = "0.5rem"
buttonRadius = "0.5rem"

[theme.dark.sidebar]
backgroundColor = "#262730"
secondaryBackgroundColor = "#0E1117"
